<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnyzo Agency | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme Variables */
            --bg-color: #f4f7fb;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-primary: #ec4899; /* Premium Pink */
            --accent-gradient: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        [data-theme="dark"] {
            /* Dark Theme Variables */
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #f472b6;
            --accent-gradient: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
            --border-color: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .nav-item.active, .nav-item:hover {
            background-color: rgba(236, 72, 153, 0.1);
            color: var(--accent-primary);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .greeting h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .greeting p {
            color: var(--text-muted);
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: var(--shadow);
        }

        /* Cards Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .card.primary {
            background: var(--accent-gradient);
            color: white;
            border: none;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .card.primary .card-title {
            color: rgba(255, 255, 255, 0.8);
        }

        .card-amount {
            font-size: 32px;
            font-weight: 700;
        }

        /* Quick Actions */
        .section-title {
            font-size: 18px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .action-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            color: var(--text-main);
            font-weight: 600;
        }

        .action-btn:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            transition: all 0.2s;
        }

        .action-icon {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--accent-primary);
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">✦ Omnyzo</div>
        <nav>
            <a href="#" class="nav-item active">Dashboard</a>
            <a href="#" class="nav-item">Invoices</a>
            <a href="#" class="nav-item">Quotations</a>
            <a href="#" class="nav-item">Cashflow</a>
            <a href="#" class="nav-item">Clients</a>
            <a href="#" class="nav-item">Settings</a>
        </nav>
    </aside>

    <main class="main-content">
        <header>
            <div class="greeting">
                <p>Good morning,</p>
                <h1>Omnyzo Agency</h1>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="card primary">
                <div class="card-title">Net Cash Flow (This Month)</div>
                <div class="card-amount">RM 15,450.00</div>
            </div>
            <div class="card">
                <div class="card-title">Outstanding</div>
                <div class="card-amount" style="color: #f59e0b;">RM 5,037.50</div>
            </div>
            <div class="card">
                <div class="card-title">Overdue</div>
                <div class="card-amount" style="color: #ef4444;">RM 0.00</div>
            </div>
        </div>

        <h2 class="section-title">Quick Actions</h2>
        <div class="actions-grid">
            <div class="action-btn">
                <div class="action-icon">📄</div>
                Create Invoice
            </div>
            <div class="action-btn">
                <div class="action-icon">📝</div>
                New Quotation
            </div>
            <div class="action-btn">
                <div class="action-icon">💸</div>
                Record Expense
            </div>
            <div class="action-btn">
                <div class="action-icon">👥</div>
                Add Client
            </div>
        </div>
    </main>

    <script>
        // Dark/Light Mode Logic
        const themeBtn = document.getElementById('themeBtn');
        
        // Check local storage for saved theme
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            themeBtn.innerText = '☀️ Light Mode';
        }

        function toggleTheme() {
            if (document.body.getAttribute('data-theme') === 'dark') {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeBtn.innerText = '🌙 Dark Mode';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeBtn.innerText = '☀️ Light Mode';
            }
        }
    </script>

</body>
</html>
