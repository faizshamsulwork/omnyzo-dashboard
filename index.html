<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Omnyzo: Admin</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/faizshamsulwork/omnyzo-dashboard/main/OMNYZO-pink01.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/faizshamsulwork/omnyzo-dashboard/main/OMNYZO-pink01.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#080910">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #080910; --surface-1: #0f1015; --surface-2: #161820; --surface-3: #1e2029;
            --border: rgba(255,255,255,0.06); --border-2: rgba(255,255,255,0.1);
            --text: #f0f0f5; --text-2: #9494a8; --text-3: #5a5a70;
            --pink: #e14e65; --pink-dim: rgba(225,78,101,0.12); --pink-glow: rgba(225,78,101,0.3);
            --blue: #4f8ef7; --blue-dim: rgba(79,142,247,0.12);
            --green: #22d3a5; --orange: #f59e0b;
            --nav-active: rgba(225,78,101,0.1);
            --radius: 16px; --radius-sm: 10px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        [data-theme="light"] {
            --bg: #f0f1f5; --surface-1: #ffffff; --surface-2: #ffffff; --surface-3: #f7f8fc;
            --border: rgba(0,0,0,0.06); --border-2: rgba(0,0,0,0.1);
            --text: #111118; --text-2: #6b6b80; --text-3: #9a9aae;
            --nav-active: rgba(225,78,101,0.08);
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; overflow: hidden; -webkit-font-smoothing: antialiased; transition: background 0.4s, color 0.4s; }

        /* ─── INTRO PAGE ─── */
        #intro-page { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #080910; transition: opacity 0.7s ease, transform 0.7s ease; }
        #intro-page.exit { opacity: 0; transform: scale(1.05); pointer-events: none; }
        .intro-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(225,78,101,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(225,78,101,0.04) 1px, transparent 1px); background-size: 60px 60px; -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%); mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%); }
        .intro-content { text-align: center; position: relative; animation: introReveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes introReveal { from { opacity: 0; transform: translateY(30px); filter: blur(12px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
        .intro-logo-wrap { width: 80px; height: 80px; background: linear-gradient(135deg, var(--pink), #c0392b); border-radius: 22px; display: flex; justify-content: center; align-items: center; margin: 0 auto 24px; box-shadow: 0 0 0 1px rgba(225,78,101,0.3), 0 0 40px rgba(225,78,101,0.4); animation: logoFloat 3s ease-in-out infinite; }
        @keyframes logoFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        .intro-logo-wrap img { width: 52px; height: 52px; border-radius: 12px; }
        .intro-eyebrow { font-family: 'Syne', sans-serif; font-size: 11px; letter-spacing: 5px; color: var(--pink); text-transform: uppercase; margin-bottom: 10px; opacity: 0.8; }
        .intro-title { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; color: #fff; letter-spacing: -1px; line-height: 1.1; margin-bottom: 8px; }
        .intro-sub { color: rgba(255,255,255,0.35); font-size: 14px; margin-bottom: 40px; }
        .btn-enter { background: linear-gradient(135deg, var(--pink) 0%, #c0392b 100%); color: #fff; border: none; padding: 16px 50px; border-radius: 100px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; box-shadow: 0 8px 30px rgba(225,78,101,0.5); transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; }
        .btn-enter::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent); }
        .btn-enter:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(225,78,101,0.7); }
        .intro-loading { display: none; margin-top: 24px; color: var(--pink); font-size: 12px; letter-spacing: 3px; font-family: 'Syne', sans-serif; text-transform: uppercase; }
        .intro-loading::after { content: ''; display: inline-block; animation: dotdot 1.2s infinite; }
        @keyframes dotdot { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} 100%{content:'.'} }
        .intro-orbs { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: orbFloat linear infinite; }
        .orb-1 { width: 500px; height: 500px; background: var(--pink); top: -200px; left: -200px; animation-duration: 20s; }
        .orb-2 { width: 400px; height: 400px; background: var(--blue); bottom: -150px; right: -150px; animation-duration: 25s; animation-delay: -8s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 33%{transform:translate(30px,-20px)} 66%{transform:translate(-20px,30px)} }

        /* ─── APP CONTAINER & SIDEBAR ─── */
        #app-container { display: none; width: 100%; height: 100%; opacity: 0; transition: opacity 0.6s ease; }
        #app-container.visible { display: flex; }
        #app-container.shown { opacity: 1; }
        .sidebar { width: 260px; flex-shrink: 0; background: var(--surface-1); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 12px; z-index: 100; transition: background 0.4s; }
        .brand { display: flex; align-items: center; gap: 10px; padding: 10px 10px 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .brand-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--pink), #c0392b); border-radius: 9px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 12px var(--pink-glow); }
        .brand-icon img { width: 22px; height: 22px; border-radius: 4px; }
        .brand-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: -0.3px; }
        .brand-tag { font-size: 10px; color: var(--text-3); font-weight: 500; }
        .nav-section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--text-3); text-transform: uppercase; padding: 0 10px; margin-bottom: 6px; }
        .nav-item { display: flex; align-items: center; gap: 11px; padding: 11px 12px; border-radius: var(--radius-sm); color: var(--text-2); font-weight: 500; font-size: 14px; cursor: pointer; margin-bottom: 2px; transition: all 0.15s; position: relative; }
        .nav-item svg { width: 17px; height: 17px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        .nav-item:hover { background: var(--surface-3); color: var(--text); }
        .nav-item.active { background: var(--nav-active); color: var(--pink); font-weight: 600; }
        .nav-item.active::before { content: ''; position: absolute; left: 0; top: 25%; bottom: 25%; width: 3px; background: var(--pink); border-radius: 0 3px 3px 0; }
        .sidebar-spacer { flex: 1; }
        .theme-toggle { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid var(--border); margin-bottom: 10px; transition: all 0.15s; }
        .toggle-track { width: 40px; height: 22px; border-radius: 11px; background: var(--surface-3); border: 1px solid var(--border-2); position: relative; transition: background 0.3s; }
        [data-theme="light"] .toggle-track { background: var(--pink); }
        .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform 0.3s cubic-bezier(0.68,-0.55,0.265,1.55); display: flex; justify-content: center; align-items: center; font-size: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        [data-theme="light"] .toggle-thumb { transform: translateX(18px); }
        .toggle-label { font-size: 13px; font-weight: 500; color: var(--text-2); }
        .user-area { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); transition: all 0.15s; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--pink), #c0392b); display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 13px; color: #fff; flex-shrink: 0; }
        .user-name { font-size: 13px; font-weight: 600; }
        .user-role { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; }
        .reload-btn { margin-left: auto; background: none; border: none; color: var(--text-3); cursor: pointer; padding: 5px; border-radius: 6px; transition: all 0.15s; display: flex; align-items: center; }

        /* ─── MAIN ─── */
        .main { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }
        .main-inner { padding: 36px 40px; min-height: 100%; }
        .view-section { display: none; animation: viewIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
        .view-section.active-view { display: block; }
        @keyframes viewIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; gap: 20px; }
        .page-header h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; }
        .page-header p { font-size: 13px; color: var(--text-2); margin-top: 4px; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 20px; }
        .card h3 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 20px; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
        .stat-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; position: relative; overflow: hidden; }
        .stat-card::after { content: ''; position: absolute; top: 0; right: 0; left: 0; height: 2px; opacity: 0; transition: opacity 0.2s; }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-card:hover::after { opacity: 1; }
        .stat-card.pink::after { background: var(--pink); } .stat-card.blue::after { background: var(--blue); } .stat-card.orange::after { background: var(--orange); } .stat-card.green::after { background: var(--green); }
        .stat-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; justify-content: center; align-items: center; margin-bottom: 16px; }
        .stat-icon svg { width: 17px; height: 17px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .stat-icon.pink { background: var(--pink-dim); color: var(--pink); } .stat-icon.blue { background: var(--blue-dim); color: var(--blue); } .stat-icon.orange { background: rgba(245,158,11,0.12); color: var(--orange); } .stat-icon.green { background: rgba(34,211,165,0.12); color: var(--green); }
        .stat-label { font-size: 11px; font-weight: 600; color: var(--text-3); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
        .stat-val { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
        .hero-stat { grid-column: span 1; background: linear-gradient(135deg, var(--pink) 0%, #c0392b 100%); border: none; color: #fff; }
        .hero-stat .stat-icon { background: rgba(255,255,255,0.15); color: #fff; }
        .hero-stat .stat-val, .hero-stat .stat-label { color: #fff; }

        .dash-bottom { display: grid; grid-template-columns: 3fr 2fr; gap: 20px; }
        .quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 22px; }
        .qa-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; text-align: left; }
        .qa-card:hover { border-color: var(--border-2); background: var(--surface-3); transform: translateY(-1px); }
        .qa-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .qa-icon svg { width: 17px; height: 17px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .qa-label { font-size: 13px; font-weight: 600; }
        .qa-sub { font-size: 11px; color: var(--text-3); }

        .progress-wrap { margin-bottom: 24px; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
        .progress-track { height: 6px; background: rgba(225,78,101,0.15); border-radius: 3px; overflow: hidden; display: flex; }
        .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 1s ease-out; }
        
        .attention-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--surface-3); border-radius: var(--radius-sm); margin-bottom: 8px; border: 1px solid var(--border); }
        .attention-client { font-size: 13px; font-weight: 600; }
        .attention-meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
        .attention-amt { font-size: 13px; font-weight: 700; color: var(--orange); }

        .table-wrap { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
        .tbl-header, .tbl-row { min-width: 800px; }
        .tbl-header { display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr 1fr 0.8fr 1.5fr; padding: 12px 20px; font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        .tbl-row { display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr 1fr 0.8fr 1.5fr; padding: 16px 20px; font-size: 13px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.15s; }
        .tbl-row:hover { background: var(--surface-3); }
        .cf-header, .cf-row { min-width: 900px; }
        .cf-header { display: grid; grid-template-columns: 1fr 1.5fr 1fr 1.5fr 1fr 80px 120px; padding: 12px 20px; font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        .cf-row { display: grid; grid-template-columns: 1fr 1.5fr 1fr 1.5fr 1fr 80px 120px; padding: 16px 20px; font-size: 13px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.15s; }
        .cf-row:hover { background: var(--surface-3); }
        .cust-header, .cust-row { min-width: 700px; }
        .cust-header { display: grid; grid-template-columns: 2fr 2fr 3fr 80px; padding: 12px 20px; font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        .cust-row { display: grid; grid-template-columns: 2fr 2fr 3fr 80px; padding: 16px 20px; font-size: 13px; border-bottom: 1px solid var(--border); align-items: center; }
        .freelance-header, .freelance-row { min-width: 700px; }
        .freelance-header { display: grid; grid-template-columns: 2.5fr 2fr 2fr 2.5fr 50px; padding: 12px 20px; font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        .freelance-row { display: grid; grid-template-columns: 2.5fr 2fr 2fr 2.5fr 50px; padding: 16px 20px; font-size: 13px; border-bottom: 1px solid var(--border); align-items: center; }
        .cust-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--pink-dim); color: var(--pink); display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 12px; flex-shrink: 0; }

        .tag { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .tag::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
        .tag-pending { background: rgba(245,158,11,0.12); color: var(--orange); }
        .tag-paid { background: rgba(34,211,165,0.12); color: var(--green); }
        .tag-draft { background: rgba(148,148,168,0.1); color: var(--text-2); }
        .tag-sent { background: var(--blue-dim); color: var(--blue); }
        .tag-approved { background: rgba(34,211,165,0.12); color: var(--green); }
        .tag-rejected { background: var(--pink-dim); color: var(--pink); }

        .action-btns { display: flex; gap: 6px; justify-content: flex-end; }
        .action-btn { padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid; display: inline-flex; align-items: center; gap: 4px; transition: all 0.15s; white-space: nowrap; background: transparent;}
        .btn-pay { color: var(--green); border-color: rgba(34,211,165,0.3); } .btn-pay:hover { background: rgba(34,211,165,0.1); }
        .btn-undo { color: var(--text-2); border-color: var(--border); } .btn-undo:hover { background: var(--surface-3); color: var(--text); }
        .btn-view { color: var(--text-2); border-color: var(--border); } .btn-view:hover { background: var(--surface-3); }
        .btn-edit { color: var(--blue); border-color: rgba(79,142,247,0.3); } .btn-edit:hover { background: var(--blue-dim); }
        .btn-delete { color: var(--pink); border-color: rgba(225,78,101,0.3); } .btn-delete:hover { background: var(--pink-dim); }

        .btn-solid { background: var(--pink); color: #fff; border: none; padding: 13px 20px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; width: 100%; transition: all 0.2s; box-shadow: 0 4px 14px var(--pink-glow); }
        .btn-solid:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border-2); padding: 13px 20px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; width: 100%; transition: all 0.2s; }
        .btn-outline:hover { background: var(--surface-3); border-color: var(--border-2); }
        .btn-add { width: 40px; height: 40px; border-radius: 50%; background: var(--pink); color: #fff; border: none; font-size: 22px; display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; box-shadow: 0 4px 14px var(--pink-glow); transition: all 0.2s; }
        .btn-add:hover { transform: rotate(90deg) scale(1.1); }
        .btn-add.blue { background: var(--blue); box-shadow: 0 4px 14px rgba(79,142,247,0.4); }

        .search-box { background: var(--surface-3); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 100px; font-size: 13px; font-family: 'DM Sans', sans-serif; width: 240px; outline: none; transition: all 0.2s; }
        .search-box:focus { border-color: var(--pink); box-shadow: 0 0 0 3px var(--pink-dim); }
        .form-group { margin-bottom: 0; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 7px; }
        .form-control { width: 100%; padding: 11px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface-3); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; transition: all 0.2s; outline: none; }
        .form-control:focus { border-color: var(--pink); box-shadow: 0 0 0 3px var(--pink-dim); }
        textarea.form-control { resize: vertical; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .invoice-container { display: grid; grid-template-columns: 1.8fr 1fr; gap: 24px; align-items: start; }
        .summary-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; position: sticky; top: 0; }
        .summary-card h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 24px; }
        .summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-size: 13px; color: var(--text-2); }
        .summary-input { width: 90px; padding: 6px 10px; background: var(--surface-3); border: 1px solid var(--border); color: var(--text); border-radius: 8px; text-align: center; font-size: 13px; }
        .summary-total { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .summary-total h3 { font-size: 14px; color: var(--text-2); }
        .summary-total h2 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--text); }

        .item-header { display: grid; grid-template-columns: 2fr 0.5fr 1fr 1fr 80px; gap: 12px; font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px; min-width: 560px; }
        .item-row { display: grid; grid-template-columns: 2fr 0.5fr 1fr 1fr 80px; gap: 12px; margin-bottom: 10px; align-items: start; min-width: 560px; animation: slideIn 0.25s forwards; }
        @keyframes slideIn { from { opacity:0; transform: translateX(10px); } to { opacity:1; transform: translateX(0); } }

        .wizard-step { display: none; }
        .wizard-step.active { display: block; animation: viewIn 0.3s forwards; }
        .wiz-bar { height: 3px; flex: 1; border-radius: 2px; background: var(--border); transition: background 0.3s; }

<script>
// URL BARU OMNYZO V3 (DGN RESIT RASMI)
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyWv1drj99imW8DDkYaXnaJxpE3zK-XcBsciqb6Dn5Z__J3hLm99uG-DHoNycSqXxe9/exec';

let appData = { invoices:[], quotations:[], customers:[], freelancers:[], logs:[], cashflow:[] };
let pendingConfirm = null; let editingCustomer = null, editingFreelancer = null;
const currentUser = 'Boss';

// VAKSIN ANTI-CORS
function apiPost(payload) {
    return fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
    }).then(r => r.json());
}

function uf(v){ return parseFloat((v+'').replace(/,/g,''))||0; }
function fc(v){ return parseFloat(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function formatInput(inp){ let v=inp.value.replace(/,/g,''); if(!isNaN(v)&&v.length>0&&!v.endsWith('.')){} }
function fmt(v){ return 'RM '+fc(v); }
function fdate(str){ let d=new Date(str); return isNaN(d)?str:('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear(); }
function fcleanAddr(c){ let p=[]; if(c.address)p.push(c.address); if(c.postcode||c.city)p.push((c.postcode||'')+' '+(c.city||'')); if(c.state)p.push(c.state); return p.join(', '); }

function showToast(msg, isErr=false){
    const t=document.getElementById('toast'); document.getElementById('toast-msg').innerText=msg;
    document.getElementById('toast-icon').innerText=isErr?'✕':'✓';
    t.className=''; t.classList.add('show'); if(isErr)t.classList.add('error');
    setTimeout(()=>t.classList.remove('show'),3500);
}
function showConfirm(title,msg,cb){ document.getElementById('confirm-title').innerText=title; document.getElementById('confirm-msg').innerText=msg; pendingConfirm=cb; document.getElementById('confirm-modal').classList.add('show'); }
function closeConfirm(){ document.getElementById('confirm-modal').classList.remove('show'); pendingConfirm=null; }
document.getElementById('confirm-yes').onclick=function(){ if(pendingConfirm)pendingConfirm(); closeConfirm(); };

function enterDashboard(){
    document.getElementById('startBtn').style.display='none'; document.getElementById('introLoading').style.display='block';
    fetchAppData().then(()=>{ const ip=document.getElementById('intro-page'); ip.classList.add('exit'); setTimeout(()=>{ ip.style.display='none'; const ac=document.getElementById('app-container'); ac.classList.add('visible'); requestAnimationFrame(()=>requestAnimationFrame(()=>{ ac.classList.add('shown'); showToast('Welcome back, Boss!'); })); },700); }).catch(()=>{ document.getElementById('startBtn').style.display='inline-block'; document.getElementById('introLoading').style.display='none'; showToast('Connection error. Please check Web App URL.',true); });
}
function logoutApp(){ window.location.reload(); }

function fetchAppData(){
    return fetch(SCRIPT_URL+'?t='+Date.now()).then(r=>r.json()).then(d=>{
        if(d.status==='success'){ appData=d; renderAll(); if(d.nextInvoiceNo&&!document.getElementById('editingInvFlag').value) document.getElementById('invNo').value=d.nextInvoiceNo; if(d.nextQtnNo&&!document.getElementById('editingQtnFlag').value) document.getElementById('qtnNo').value=d.nextQtnNo; } else { throw new Error('bad status'); }
    });
}

function switchView(id,nav){ document.querySelectorAll('.view-section').forEach(v=>v.classList.remove('active-view')); if(nav){ document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); nav.classList.add('active'); } document.getElementById(id).classList.add('active-view'); }
function toggleTheme(){ const b=document.body; const isLight=b.getAttribute('data-theme')==='light'; b.setAttribute('data-theme',isLight?'dark':'light'); document.getElementById('theme-label').innerText=isLight?'Dark Mode':'Light Mode'; document.getElementById('toggle-thumb').innerText=isLight?'🌙':'☀️'; }
function toggleNotif(){ const p=document.getElementById('notif-panel'); const b=document.getElementById('notif-badge'); if(p.classList.contains('show')){ p.classList.remove('show'); b.style.display='none'; localStorage.setItem('omnyzo_last',Date.now()); } else p.classList.add('show'); }
function filterRows(containerId,searchId){ const q=document.getElementById(searchId).value.toLowerCase(); document.querySelectorAll('#'+containerId+' .tbl-row, #'+containerId+' .cf-row').forEach(r=>{ r.style.display=r.innerText.toLowerCase().includes(q)?'grid':'none'; }); }
function filterContacts(){ const q=document.getElementById('searchContacts').value.toLowerCase(); document.querySelectorAll('#customerListContainer .cust-row').forEach(r=>r.style.display=r.innerText.toLowerCase().includes(q)?'grid':'none'); document.querySelectorAll('#freelancerListContainer .freelance-row').forEach(r=>r.style.display=r.innerText.toLowerCase().includes(q)?'grid':'none'); }
function autoFillPostcode(v){ if(v.length===5&&/^\d+$/.test(v)){ fetch('https://api.zippopotam.us/MY/'+v).then(r=>r.json()).then(d=>{ if(d&&d.places&&d.places.length>0){ document.getElementById('custCity').value=d.places[0]['place name']; document.getElementById('custState').value=d.places[0]['state']; } }).catch(()=>{}); } }

function openCustModal(){ editingCustomer=null; document.querySelector('#customer-modal h2').innerText='Add Customer'; document.getElementById('customerForm').reset(); document.getElementById('custPhone').value='+60'; document.getElementById('customer-modal').classList.add('show'); }
function editCustomer(co){ let c=appData.customers.find(x=>x.company===co); if(!c)return; editingCustomer=co; document.getElementById('custType').value=c.custType||'Company'; document.getElementById('custCompany').value=c.company; document.getElementById('custPIC').value=c.pic; document.getElementById('custEmail').value=c.email; document.getElementById('custPhone').value=c.phone; document.getElementById('custAddress').value=c.address; document.getElementById('custPostcode').value=c.postcode; document.getElementById('custCity').value=c.city; document.getElementById('custState').value=c.state; document.querySelector('#customer-modal h2').innerText='Edit Customer'; document.getElementById('customer-modal').classList.add('show'); }
document.getElementById('customerForm').addEventListener('submit',function(e){ e.preventDefault(); const btn=document.getElementById('saveCustBtn'); const ot=btn.innerText; btn.innerText='Saving...'; btn.disabled=true; const p={type:editingCustomer?'update_customer':'customer',username:currentUser,oldCompany:editingCustomer,custType:document.getElementById('custType').value,company:document.getElementById('custCompany').value,pic:document.getElementById('custPIC').value,email:document.getElementById('custEmail').value,phone:document.getElementById('custPhone').value,tin:document.getElementById('custTIN').value,ssm:document.getElementById('custSSM').value,address:document.getElementById('custAddress').value,postcode:document.getElementById('custPostcode').value,city:document.getElementById('custCity').value,state:document.getElementById('custState').value}; apiPost(p).then(r=>{btn.innerText=ot;btn.disabled=false;if(r.status==='success'){document.getElementById('customer-modal').classList.remove('show');document.getElementById('customerForm').reset();document.getElementById('custPhone').value='+60';showToast(editingCustomer?'Customer Updated!':'Customer Saved!');editingCustomer=null;fetchAppData();}}).catch(()=>{btn.innerText=ot;btn.disabled=false;showToast('Error.',true);}); });

function openFreeModal(){ editingFreelancer=null; document.querySelector('#freelancer-modal h2').innerText='Add Freelancer'; document.getElementById('freelancerForm').reset(); document.getElementById('freePhone').value='+60'; document.getElementById('freeOtherBank').style.display='none'; document.getElementById('freelancer-modal').classList.add('show'); }
function editFreelancer(name){ let f=appData.freelancers.find(x=>x.name===name); if(!f)return; editingFreelancer=name; document.getElementById('freeName').value=f.name; document.getElementById('freePhone').value=f.phone; document.getElementById('freeEmail').value=f.email; document.getElementById('freeService').value=f.service; let parts=f.bank.split(' - '); let bn=parts[0]||''; let ba=parts[1]||''; let sel=document.getElementById('freeBankName'); let opts=Array.from(sel.options).map(o=>o.value); if(opts.includes(bn)){sel.value=bn;document.getElementById('freeOtherBank').style.display='none';}else{sel.value='Other';document.getElementById('freeOtherBank').style.display='block';document.getElementById('freeOtherBank').value=bn;} document.getElementById('freeBankAcc').value=ba; document.querySelector('#freelancer-modal h2').innerText='Edit Freelancer'; document.getElementById('freelancer-modal').classList.add('show'); }
document.getElementById('freelancerForm').addEventListener('submit',function(e){ e.preventDefault(); const btn=document.getElementById('saveFreeBtn'); const ot=btn.innerText; btn.innerText='Saving...'; btn.disabled=true; let bn=document.getElementById('freeBankName').value; if(bn==='Other')bn=document.getElementById('freeOtherBank').value; const p={type:editingFreelancer?'update_freelancer':'freelancer',username:currentUser,oldName:editingFreelancer,name:document.getElementById('freeName').value,phone:document.getElementById('freePhone').value,email:document.getElementById('freeEmail').value,service:document.getElementById('freeService').value,bank:bn+' - '+document.getElementById('freeBankAcc').value}; apiPost(p).then(r=>{btn.innerText=ot;btn.disabled=false;if(r.status==='success'){document.getElementById('freelancer-modal').classList.remove('show');document.getElementById('freelancerForm').reset();document.getElementById('freePhone').value='+60';document.getElementById('freeOtherBank').style.display='none';showToast(editingFreelancer?'Freelancer Updated!':'Freelancer Saved!');editingFreelancer=null;fetchAppData();}}).catch(()=>{btn.innerText=ot;btn.disabled=false;showToast('Error.',true);}); });

function openDeleteModal(no,type){ document.getElementById('del-doc-label').innerText=no; document.getElementById('del-doc-no').value=no; document.getElementById('del-doc-type').value=type; document.getElementById('delete-modal').classList.add('show'); }
document.getElementById('delForm').addEventListener('submit',function(e){ e.preventDefault(); const btn=this.querySelector('button[type=submit]'); const ot=btn.innerText; btn.innerText='Deleting...'; btn.disabled=true; const p={type:'delete_doc',username:currentUser,docNo:document.getElementById('del-doc-no').value,docType:document.getElementById('del-doc-type').value}; if(p.docType==='transaction')p.rowIdx=p.docNo; apiPost(p).then(r=>{btn.innerText=ot;btn.disabled=false;if(r.status==='success'){document.getElementById('delete-modal').classList.remove('show');showToast('Deleted!');fetchAppData();}else showToast('Delete failed.',true);}).catch(()=>{btn.innerText=ot;btn.disabled=false;showToast('Error.',true);}); });

function autoFillCust(prefix){ const comp=document.getElementById(prefix+'Customer').value; if(!comp)return; const c=appData.customers.find(x=>x.company===comp); if(!c)return; document.getElementById(prefix+'PIC').value=c.pic||''; document.getElementById(prefix+'Phone').value=c.phone||''; document.getElementById(prefix+'Email').value=c.email||''; document.getElementById(prefix+'Address').value=fcleanAddr(c)||''; }
function localDocNo(prefix,dataset,key){ let today=new Date(); let yy=today.getFullYear().toString().slice(-2); let mm=String(today.getMonth()+1).padStart(2,'0'); let cp=prefix+'-'+yy+mm+'-'; let max=0; dataset.forEach(item=>{ if(item[key]&&item[key].startsWith(cp)){let n=parseInt((item[key].split('-')[2])||0);if(n>max)max=n;} }); return cp+String(max+1).padStart(3,'0'); }
function moveUp(btn){ let r=btn.closest('.item-row'); if(r.previousElementSibling?.classList.contains('item-row'))r.parentNode.insertBefore(r,r.previousElementSibling); }
function moveDown(btn){ let r=btn.closest('.item-row'); if(r.nextElementSibling?.classList.contains('item-row'))r.parentNode.insertBefore(r.nextElementSibling,r); }
function removeRow(btn){ let r=btn.closest('.item-row'); let isQtn=!!r.closest('#quotationItemsContainer'); r.remove(); isQtn?calcQtnTotal():calcInvTotal(); }
function updateRowTotal(inp,type){ const r=inp.closest('.item-row'); let qty=uf(r.querySelector('.item-qty').value); let p=uf(r.querySelector('.item-price').value); r.querySelector('.item-total').innerText=fc(qty*p); type==='inv'?calcInvTotal():calcQtnTotal(); }

function viewInvDetail(no){ 
    let inv=appData.invoices.find(i=>i.invoiceNo===no); if(!inv)return; 
    
    document.getElementById('detail-inv-no').innerText=inv.invoiceNo; 
    document.getElementById('detail-inv-client').innerText=inv.client; 
    document.getElementById('detail-inv-status').innerText=inv.status; 
    document.getElementById('detail-inv-status').className='tag tag-'+inv.status.toLowerCase(); 
    
    // BUTANG RECEIPT / PAY
    let btnDlReceipt = document.getElementById('btn-download-receipt');
    let btnDlInv = document.getElementById('btn-download-inv');
    if (inv.status === 'Paid' && inv.receiptNo) {
        btnDlReceipt.style.display = 'inline-flex';
        // Setup hidden receipt info
        document.getElementById('rec-no').innerText = inv.receiptNo;
        document.getElementById('rec-date').innerText = fdate(inv.paymentDate);
        document.getElementById('rec-method').innerText = inv.paymentMethod;
        document.getElementById('rec-inv-ref').innerText = inv.invoiceNo;
        document.getElementById('rec-client').innerText = inv.client;
        document.getElementById('rec-amount').innerText = 'RM ' + fc(inv.amount);
        let c=appData.customers.find(x=>x.company===inv.client); 
        let addr=c?fcleanAddr(c)+'<br>'+(c.phone||'')+'<br>'+(c.email||''):'-'; 
        document.getElementById('rec-address').innerHTML=(inv.fullData&&inv.fullData.address)?`${inv.fullData.address}<br>${inv.fullData.phone||''}<br>${inv.fullData.email||''}`:addr;
    } else {
        btnDlReceipt.style.display = 'none';
    }

    const mailto=`mailto:?subject=Invoice ${inv.invoiceNo} from Omnyzo Agency&body=Hi ${inv.client},%0D%0A%0D%0APlease find your invoice at:%0D%0A${inv.pdfLink||''}%0D%0A%0D%0AThank you!`; document.getElementById('btn-inv-email').href=mailto; 
    
    let dStr=fdate(inv.date); let dueStr=fdate(inv.dueDate); 
    document.getElementById('li-inv-no').innerText=inv.invoiceNo; document.getElementById('li-inv-date').innerText=dStr; document.getElementById('li-inv-due').innerText=dueStr; document.getElementById('li-inv-client').innerText=inv.client; 
    
    let paPage=document.getElementById('li-pa-page'); 
    // HIDE Payment Advice jika Paid ATAU jika user untick box
    if(inv.status === 'Paid' || inv.hasPaymentAdvice===false){paPage.style.display='none';}else{paPage.style.display='block';} 
    
    let c=appData.customers.find(x=>x.company===inv.client); let addr=c?fcleanAddr(c)+'<br>'+(c.phone||'')+'<br>'+(c.email||''):'-'; document.getElementById('li-inv-address').innerHTML=(inv.fullData&&inv.fullData.address)?`${inv.fullData.address}<br>${inv.fullData.phone||''}<br>${inv.fullData.email||''}`:addr; let iHtml=''; let calcSub=0; if(inv.sheetItems&&inv.sheetItems.length>0){inv.sheetItems.forEach(i=>{let isHdr=!i.price||parseFloat(i.price)===0||isNaN(parseFloat(i.price));if(isHdr){iHtml+=`<tr><td style="font-weight:800;white-space:pre-wrap;">${i.desc}</td><td></td><td></td><td></td></tr>`;}else{iHtml+=`<tr><td style="white-space:pre-wrap;">${i.desc}</td><td>${fc(i.price)}</td><td>${i.qty}</td><td>${fc(i.total)}</td></tr>`;calcSub+=parseFloat(i.total);}});}else{iHtml=`<tr><td>Professional Services</td><td>${fc(inv.amount)}</td><td>1</td><td>${fc(inv.amount)}</td></tr>`;calcSub=parseFloat(inv.amount);} document.getElementById('li-inv-items').innerHTML=iHtml; document.getElementById('li-inv-sub').innerText=fc(inv.subtotal||calcSub); if(inv.discount&&parseFloat(inv.discount)>0){document.getElementById('li-inv-disc-row').style.display='flex';document.getElementById('li-inv-disc').innerText='- '+fc(inv.discount);}else document.getElementById('li-inv-disc-row').style.display='none'; let tType=inv.taxType&&inv.taxType!=='None'?inv.taxType:'Tax'; let tSign=inv.taxType==='WHT'?'- ':''; document.getElementById('li-inv-tax-lbl').innerText=tType; document.getElementById('li-inv-tax').innerText=tSign+fc(inv.taxAmount||0); document.getElementById('li-inv-total').innerText='RM '+fc(inv.amount); document.getElementById('li-inv-terms').innerText=inv.tc||'Standard terms apply.'; if(inv.notes&&inv.notes.trim()){document.getElementById('li-inv-notes-wrap').style.display='block';document.getElementById('li-inv-notes').innerText=inv.notes;}else document.getElementById('li-inv-notes-wrap').style.display='none'; document.getElementById('pa-client').innerText=inv.client; document.getElementById('pa-inv-no').innerText=inv.invoiceNo; document.getElementById('pa-due').innerText=dueStr; document.getElementById('pa-amt').innerText='RM '+fc(inv.amount); switchView('invoice-detail-view'); 
}

document.getElementById('payInvoiceForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = this.querySelector('button'); btn.innerText = "Processing..."; btn.disabled = true;
    const invNo = document.getElementById('payInvNo').value;
    const pDate = document.getElementById('payInvDate').value;

function downloadInvPDF(){ const el=document.getElementById('invoiceCaptureArea'); const no=document.getElementById('li-inv-no').innerText; showToast('Generating Invoice PDF...'); el.style.boxShadow='none'; el.style.border='none'; html2pdf().set({margin:[0.4,0,0.4,0],filename:`Invoice_${no}.pdf`,image:{type:'jpeg',quality:1},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'in',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy']}}).from(el).save().then(()=>{el.style.boxShadow='';el.style.border='1px solid #eee';showToast('Invoice Downloaded!');}); }

function downloadReceiptPDF(){ 
    const el = document.getElementById('receiptCaptureArea'); 
    el.parentElement.style.display = 'block'; // Unhide temp
    const recNo = document.getElementById('rec-no').innerText; 
    showToast('Generating Receipt PDF...'); 
    html2pdf().set({
        margin:[0.4,0,0.4,0],
        filename:`Receipt_${recNo}.pdf`,
        image:{type:'jpeg',quality:1},
        html2canvas:{scale:2,useCORS:true},
        jsPDF:{unit:'in',format:'a4',orientation:'portrait'}
    }).from(el).save().then(()=>{
        el.parentElement.style.display = 'none'; // Hide again
        showToast('Receipt Downloaded!');
    }); 
}

function viewQtnDetail(no){ let qtn=appData.quotations.find(q=>q.quotationNo===no); if(!qtn)return; document.getElementById('detail-qtn-no').innerText=qtn.quotationNo; document.getElementById('detail-qtn-client').innerText=qtn.client; document.getElementById('detail-qtn-status').innerText=qtn.status; document.getElementById('detail-qtn-status').className='tag tag-'+qtn.status.toLowerCase(); const mailto=`mailto:?subject=Quotation ${qtn.quotationNo} from Omnyzo Agency&body=Hi ${qtn.client},%0D%0A%0D%0AYour quotation PDF:%0D%0A${qtn.pdfLink||''}%0D%0A%0D%0AThank you!`; document.getElementById('btn-qtn-email').href=mailto; document.getElementById('li-qtn-no').innerText=qtn.quotationNo; document.getElementById('li-qtn-date').innerText=fdate(qtn.date); document.getElementById('li-qtn-due').innerText=fdate(qtn.validDate); document.getElementById('li-qtn-client').innerText=qtn.client; let c=appData.customers.find(x=>x.company===qtn.client); let addr=c?fcleanAddr(c)+'<br>'+(c.phone||'')+'<br>'+(c.email||''):'-'; document.getElementById('li-qtn-address').innerHTML=(qtn.fullData&&qtn.fullData.address)?`${qtn.fullData.address}<br>${qtn.fullData.phone||''}<br>${qtn.fullData.email||''}`:addr; let iHtml=''; let calcSub=0; if(qtn.sheetItems&&qtn.sheetItems.length>0){qtn.sheetItems.forEach(i=>{let isHdr=!i.price||parseFloat(i.price)===0||isNaN(parseFloat(i.price));if(isHdr){iHtml+=`<tr><td style="font-weight:800;white-space:pre-wrap;">${i.desc}</td><td></td><td></td><td></td></tr>`;}else{iHtml+=`<tr><td style="white-space:pre-wrap;">${i.desc}</td><td>${fc(i.price)}</td><td>${i.qty}</td><td>${fc(i.total)}</td></tr>`;calcSub+=parseFloat(i.total);}});}else{iHtml=`<tr><td>Project Services</td><td>${fc(qtn.amount)}</td><td>1</td><td>${fc(qtn.amount)}</td></tr>`;calcSub=parseFloat(qtn.amount);} document.getElementById('li-qtn-items').innerHTML=iHtml; document.getElementById('li-qtn-sub').innerText=fc(qtn.subtotal||calcSub); if(qtn.discount&&parseFloat(qtn.discount)>0){document.getElement function convertQtnToInv(no){ let qtn=appData.quotations.find(q=>q.quotationNo===no); if(!qtn)return; openNewInvoice(); let c=appData.customers.find(x=>x.company===qtn.client); if(c){document.getElementById('invCustomer').value=c.company;autoFillCust('inv');} document.getElementById('invoiceItemsContainer').innerHTML=''; if(qtn.sheetItems&&qtn.sheetItems.length>0){qtn.sheetItems.forEach(i=>{addInvItem(i.desc.replace(/^\d+\.\s*/,''),i.qty,i.price);});}else addInvItem(); document.getElementById('invNotes').value=qtn.notes||''; document.getElementById('invDiscount').value=qtn.discount||'0.00'; document.getElementById('invTaxType').value=qtn.taxType||'None'; document.getElementById('invTaxAmt').value=qtn.taxAmount||'0.00'; calcInvTotal(); showToast('Quote data copied to invoice!'); }
function downloadQtnPDF(){ const el=document.getElementById('quotationCaptureArea'); const no=document.getElementById('li-qtn-no').innerText; showToast('Generating PDF...'); el.style.boxShadow='none'; el.style.border='none'; html2pdf().set({margin:[0.4,0,0.4,0],filename:`${no}.pdf`,image:{type:'jpeg',quality:1},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'in',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy'],avoid:['tr','.li-summary-wrap','.li-bottom']}}).from(el).save().then(()=>{el.style.boxShadow='';el.style.border='1px solid #eee';showToast('PDF Downloaded!');}); }

function renderAll(){
    let lastRead=parseInt(localStorage.getItem('omnyzo_last')||'0'); let unread=appData.logs.filter(l=>new Date(l.time).getTime()>lastRead); const badge=document.getElementById('notif-badge');

    appData.cashflow.forEach(c=>{ let amt=uf(c.amount); let d=new Date(c.date); if(c.status==='Paid'&&d.getMonth()===cm&&d.getFullYear()===cy){if(c.type==='In')income+=amt;else expense+=amt;} });

    let totalIO=income+expense; let pct=totalIO===0?50:(income/totalIO)*100;
    document.getElementById('bar-income').innerText=fmt(income); document.getElementById('bar-expense').innerText=fmt(expense); document.getElementById('income-bar').style.width=pct+'%';
    pendingInvs.sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate)); let naHtml=''; pendingInvs.slice(0,3).forEach(i=>{ naHtml+=`<div class="attention-item"><div><div class="attention-client">${i.client}</div><div class="attention-meta">Due: ${fdate(i.dueDate)} • ${i.invoiceNo}</div></div><div style="display:flex;align-items:center;gap:10px;"><div class="attention-amt">${fmt(i.amount)}</div><button onclick="viewInvDetail('${i.invoiceNo}')" style="background:rgba(245,158,11,0.12);color:var(--orange);border:none;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;">View</button></div></div>`; }); document.getElementById('needs-attention').innerHTML=naHtml||'<div style="font-size:12px;color:var(--text-3);">All good! No pending invoices. ✓</div>';
    let lfHtml=''; appData.logs.slice(0,5).forEach(l=>{ let ts=new Date(l.time); let t=!isNaN(ts)?ts.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):l.time; lfHtml+=`<div class="feed-item"><div class="feed-dot"></div><div><div class="feed-text">${l.action}</div><div class="feed-time">${t} • ${l.user}</div></div></div>`; }); document.getElementById('live-feed').innerHTML=lfHtml||'<div style="font-size:12px;color:var(--text-3);">No recent activity.</div>';

    appData.invoices.forEach(inv=>{ 
        let amt=uf(inv.amount); totalAmt+=amt;

    let freeDrop=''; let fHtml='';
    appData.freelancers.forEach(f=>{ freeDrop+=`<option value="${f.name}">`; let init=f.name.substring(0,2).toUpperCase(); fHtml+=`<div class="freelance-row"><div style="display:flex;align-items:center;gap:12px;"><div class="cust-avatar" style="background:var(--blue-dim);color:var(--blue);">${init}</div><div style="font-weight:600;">${f.name}</div></div><div style="color:var(--text-2);font-size:12px;">${f.email}<br>${f.phone}</div><div style="font-weight:500;">${f.service}</div><div style="color:var(--text-2);font-size:12px;">${f.bank}</div><div style="text-align:right;"><button onclick="editFreelancer('${f.name.replace(/'/g,"\\'")}' )" style="background:none;border:none;color:var(--pink);cursor:pointer;padding:6px;" title="Edit">✏️</button></div></div>`; }); document.getElementById('freelancerListContainer').innerHTML=fHtml||'<div style="padding:20px;text-align:center;color:var(--text-3);">No freelancers.</div>'; let mc=document.getElementById('transMerchant').value; document.getElementById('merchantList').innerHTML=freeDrop; if(mc)document.getElementById('transMerchant').value=mc;
}
</script>
</body>
</html>
