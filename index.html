<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnyzo Agency Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #000000; --accent: #2563eb; --bg: #ffffff; --card: #f9fafb; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; display: flex; color: #111; }
        
        /* Sidebar Vercel Style */
        .sidebar { width: 240px; border-right: 1px solid #eaeaea; height: 100vh; padding: 20px; position: fixed; box-sizing: border-box; }
        .sidebar h2 { font-size: 1rem; font-weight: 700; margin-bottom: 40px; display: flex; align-items: center; }
        .sidebar h2::before { content: ""; width: 20px; height: 18px; background: black; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); margin-right: 10px; }
        .nav-item { padding: 10px; cursor: pointer; border-radius: 6px; margin-bottom: 5px; font-size: 0.9rem; color: #666; transition: 0.2s; }
        .nav-item:hover { background: #fafafa; color: #000; }
        .nav-item.active { background: #000; color: #fff; }

        /* Main Content */
        .main-content { margin-left: 240px; padding: 50px; width: 100%; box-sizing: border-box; }
        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI */
        .card { background: var(--card); border: 1px solid #eaeaea; padding: 25px; border-radius: 8px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
        .btn-black { background: #000; color: #fff; border: 1px solid #000; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 500; }
        .btn-black:hover { background: #fff; color: #000; }
        
        /* Team List */
        .team-member { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .badge { background: #e2e8f0; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 id="agencyBrand">OMNYZO</h2>
        <div class="nav-item active" onclick="showPage('dashboard')">Overview</div>
        <div class="nav-item" onclick="showPage('connect')">Data Connections</div>
        <div class="nav-item" onclick="showPage('settings')">Settings</div>
    </div>

    <div class="main-content">
        <div id="dashboard" class="page active">
            <h1 id="welcomeText">Welcome back, Faiz</h1>
            <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                <div class="card" style="flex: 1;">
                    <small>Total Spend</small>
                    <h2 id="d-spend">RM 0</h2>
                </div>
                <div class="card" style="flex: 1;">
                    <small>Total Revenue</small>
                    <h2 id="d-rev">RM 0</h2>
                </div>
            </div>
            <div class="card">
                <canvas id="mainChart" height="100"></canvas>
            </div>
        </div>

        <div id="connect" class="page">
            <h1>Connect Data Source</h1>
            <div class="card" style="max-width: 500px;">
                <label>Platform</label>
                <select id="p-source">
                    <option value="Meta Ads">Meta Ads</option>
                    <option value="Google Ads">Google Ads</option>
                </select>
                <label>Ad Spend (RM)</label>
                <input type="number" id="p-spend" placeholder="0.00">
                <label>Revenue (RM)</label>
                <input type="number" id="p-rev" placeholder="0.00">
                <button class="btn-black" onclick="syncData()">Sync to Dashboard</button>
            </div>
        </div>

        <div id="settings" class="page">
            <h1>Settings</h1>
            <div class="card">
                <h3>General</h3>
                <label>Agency Name</label>
                <input type="text" id="s-name" placeholder="Omnyzo Agency">
                <button class="btn-black" style="width: auto; padding: 10px 30px;" onclick="saveSettings()">Save Changes</button>
            </div>

            <div class="card">
                <h3>Team Members</h3>
                <div id="teamList">
                    <div class="team-member"><span>Faiz (Owner)</span> <span class="badge">Admin</span></div>
                </div>
                <div style="margin-top: 15px; display: flex; gap: 10px;">
                    <input type="text" id="newMember" placeholder="Nama staf baru..." style="margin-bottom: 0;">
                    <button class="btn-black" style="width: 120px;" onclick="addMember()">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart;

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Settings Logic
        function saveSettings() {
            const name = document.getElementById('s-name').value;
            localStorage.setItem('v_agency', name);
            document.getElementById('agencyBrand').innerText = name.toUpperCase();
            alert("Updated!");
        }

        // Team Logic
        function addMember() {
            const name = document.getElementById('newMember').value;
            if(!name) return;
            const list = document.getElementById('teamList');
            const div = document.createElement('div');
            div.className = 'team-member';
            div.innerHTML = `<span>${name}</span> <span class="badge">Editor</span>`;
            list.appendChild(div);
            document.getElementById('newMember').value = '';
        }

        // Data Logic
        function syncData() {
            const spend = document.getElementById('p-spend').value;
            const rev = document.getElementById('p-rev').value;
            localStorage.setItem('v_data', JSON.stringify({spend, rev}));
            updateUI();
            showPage('dashboard');
        }

        function updateUI() {
            const data = JSON.parse(localStorage.getItem('v_data'));
            if(data) {
                document.getElementById('d-spend').innerText = "RM " + data.spend;
                document.getElementById('d-rev').innerText = "RM " + data.rev;
                renderChart(data.spend, data.rev);
            }
        }

        function renderChart(s, r) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Spend', 'Revenue'],
                    datasets: [{
                        label: 'Performance',
                        data: [s, r],
                        backgroundColor: ['#000', '#2563eb']
                    }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });
        }

        window.onload = updateUI;
    </script>
</body>
</html>
