<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnyzo Command Centre</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000; --sidebar-bg: rgba(28, 28, 30, 0.8);
            --card-bg: #1c1c1e; --text-main: #f5f5f7; --text-muted: #a1a1a6;
            --accent-primary: #ff3b30; --border-color: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(25px);
        }
        [data-theme="light"] {
            --bg-color: #f5f5f7; --sidebar-bg: rgba(255, 255, 255, 0.8); 
            --card-bg: #ffffff; --text-main: #1d1d1f; --text-muted: #86868b;
            --border-color: rgba(0, 0, 0, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; display: flex; }
        #intro-page { position: fixed; inset: 0; z-index: 1000; display: flex; justify-content: center; align-items: center; background: #000; transition: 1s ease; }
        #introLogoGraphic { width: 320px; filter: invert(1); animation: fadeIn 1.2s ease forwards; }
        @keyframes fadeIn { to { opacity: 1; transform: scale(1); } from { opacity: 0; transform: scale(0.9); } }
        .sidebar { width: 280px; background: var(--sidebar-bg); backdrop-filter: var(--glass-blur); border-right: 1px solid var(--border-color); padding: 40px 24px; display: flex; flex-direction: column; }
        .nav-item { padding: 16px; border-radius: 14px; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
        .nav-item.active { background: var(--card-bg); color: var(--text-main); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .main-content { flex: 1; padding: 50px; overflow-y: auto; }
        .view-section { display: none; animation: slideUp 0.6s ease forwards; }
        .view-section.active-view { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--border-color); }
        .stat-card.featured { background: #ff3b30; color: #fff; border: none; }
        .stat-value { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 40px; border: 1px solid var(--border-color); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .form-control { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.03); color: var(--text-main); font-size: 15px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--card-bg); width: 400px; padding: 50px; border-radius: 30px; text-align: center; border: 1px solid var(--border-color); }
        .btn-action { background: #fff; color: #000; padding: 20px; border-radius: 40px; font-weight: 700; border: none; cursor: pointer; width: 100%; transition: 0.3s; }
    </style>
</head>
<body data-theme="dark">
    <div id="intro-page">
        <div style="text-align:center;">
            <img id="introLogoGraphic" src="https://raw.githubusercontent.com/faizshamsulwork/omnyzo-dashboard/main/OMNYZO-Black.png">
            <br><button class="btn-action" style="width:200px; margin-top:40px;" onclick="launchApp()">ENTER OS</button>
        </div>
    </div>
    <div id="success-modal" class="modal-overlay">
        <div class="modal">
            <h2 style="margin-bottom: 15px;">INVOICE READY</h2>
            <p style="color: var(--text-muted); margin-bottom: 40px;">Document generated successfully.</p>
            <a id="downloadPdfBtn" href="#" target="_blank" class="btn-action" style="text-decoration:none; display:block; background:#ff3b30; color:#fff;">DOWNLOAD PDF</a>
            <button onclick="closeSuccessModal()" style="margin-top:25px; background:none; border:none; color:var(--text-muted); cursor:pointer; font-weight:700;">CLOSE</button>
        </div>
    </div>
    <aside class="sidebar">
        <div style="margin-bottom:50px; filter:invert(1);"><img src="https://raw.githubusercontent.com/faizshamsulwork/omnyzo-dashboard/main/OMNYZO-Black.png" width="40"></div>
        <nav>
            <div class="nav-item active" onclick="switchView('dashboard-view', this)">DASHBOARD</div>
            <div class="nav-item" onclick="switchView('new-invoice-view', this)">NEW INVOICE</div>
        </nav>
        <div class="nav-item" style="margin-top:auto; border:1px solid var(--border-color); text-align:center;" onclick="toggleTheme()">SWITCH THEME</div>
    </aside>
    <main class="main-content">
        <div id="dashboard-view" class="view-section active-view">
            <h1 style="font-size: 38px; font-weight: 800; margin-bottom: 40px; letter-spacing: -1.5px;">Overview</h1>
            <div class="dash-grid">
                <div class="stat-card featured"><div style="font-size:12px; font-weight:800; margin-bottom:10px; opacity:0.8;">NET REVENUE</div><div class="stat-value" id="dash-revenue">RM 0.00</div></div>
                <div class="stat-card"><div style="font-size:12px; font-weight:800; margin-bottom:10px; opacity:0.8;">INVOICES</div><div class="stat-value" id="dash-outstanding">0</div></div>
                <div class="stat-card"><div style="font-size:12px; font-weight:800; margin-bottom:10px; opacity:0.8;">OVERDUE</div><div class="stat-value">RM 0.00</div></div>
                <div class="stat-card"><div style="font-size:12px; font-weight:800; margin-bottom:10px; opacity:0.8;">CLIENTS</div><div class="stat-value" id="dash-clients">0</div></div>
            </div>
            <div class="card"><h3>Recent Activity</h3><div id="dash-list" style="margin-top:20px; color:var(--text-muted);">No recent invoices found.</div></div>
        </div>
        <div id="new-invoice-view" class="view-section">
            <h1 style="font-size: 38px; font-weight: 800; margin-bottom: 40px; letter-spacing: -1.5px;">New Invoice</h1>
            <form id="invoiceForm">
                <div class="card">
                    <h3 style="margin-bottom:25px;">Client Details</h3>
                    <div class="form-grid">
                        <div class="form-group" style="grid-column: span 2;"><label style="font-size:11px; font-weight:800; color:var(--text-muted);">CUSTOMER NAME</label><input type="text" id="invCustomer" class="form-control" required></div>
                        <div class="form-group"><label style="font-size:11px; font-weight:800; color:var(--text-muted);">PIC NAME</label><input type="text" id="invPIC" class="form-control" required></div>
                        <div class="form-group"><label style="font-size:11px; font-weight:800; color:var(--text-muted);">PIC EMAIL</label><input type="email" id="invEmail" class="form-control"></div>
                        <div class="form-group" style="grid-column: span 2;"><label style="font-size:11px; font-weight:800; color:var(--text-muted);">ADDRESS</label><input type="text" id="invAddress" class="form-control"></div>
                        <div class="form-group"><label style="font-size:11px; font-weight:800; color:var(--text-muted);">INVOICE NO</label><input type="text" id="invNo" class="form-control" readonly></div>
                        <div class="form-group"><label style="font-size:11px; font-weight:800; color:var(--text-muted);">DATE</label><input type="date" id="invDate" class="form-control" required></div>
                    </div>
                </div>
                <div class="card"><h3>Items</h3><div id="invoiceItemsContainer" style="margin-top:20px;"></div><button type="button" onclick="addInvoiceItem()" style="background:none; border:none; color:#ff3b30; font-weight:800; cursor:pointer; margin-top:20px;">+ ADD LINE</button></div>
                <div class="card"><h3>Terms</h3><textarea id="invTerms" class="form-control" rows="3" style="margin-top:20px;">Payment is due within 30 days.</textarea></div>
                <button type="submit" id="saveInvoiceBtn" class="btn-action" style="background:#ff3b30; color:#fff;">GENERATE INVOICE</button>
            </form>
        </div>
    </main>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwjGOmilyVJbI39FFLfnVQ4LgF3xd7k96i8FCwvl6DX_mqbAypkPDstFZaORAzi9J1y/exec';
        function launchApp() {
            document.getElementById('intro-page').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-page').style.display = 'none';
                document.getElementById('invDate').valueAsDate = new Date();
                addInvoiceItem(); fetchDashboardData();
            }, 800);
        }
        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }
        function switchView(viewId, nav) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(viewId).classList.add('active-view');
            nav.classList.add('active');
            if(viewId === 'dashboard-view') fetchDashboardData();
        }
        function addInvoiceItem() {
            const container = document.getElementById('invoiceItemsContainer');
            const row = document.createElement('div'); row.className = 'form-grid'; row.style.marginBottom = '15px';
            row.innerHTML = `<input type="text" placeholder="Item" class="form-control" style="grid-column: span 2;" required><input type="number" placeholder="Qty" class="form-control" value="1"><input type="number" placeholder="Price" class="form-control" value="0">`;
            container.appendChild(row);
        }
        function fetchDashboardData() {
            fetch(SCRIPT_URL).then(res => res.json()).then(data => {
                if(data.status === 'success') {
                    let total = 0; let clients = new Set();
                    data.invoices.forEach(inv => { total += parseFloat(inv.amount) || 0; if(inv.client) clients.add(inv.client); });
                    document.getElementById('dash-revenue').innerText = 'RM ' + total.toLocaleString();
                    document.getElementById('dash-outstanding').innerText = data.invoices.length;
                    document.getElementById('dash-clients').innerText = clients.size;
                    if(data.nextInvoiceNo) document.getElementById('invNo').value = data.nextInvoiceNo;
                }
            });
        }
        function showSuccessModal(pdfUrl) { document.getElementById('downloadPdfBtn').href = pdfUrl; document.getElementById('success-modal').classList.add('show'); }
        function closeSuccessModal() { document.getElementById('success-modal').classList.remove('show'); switchView('dashboard-view', document.querySelector('.nav-item')); }
        document.getElementById('invoiceForm').addEventListener('submit', function(e) {
            e.preventDefault(); const btn = document.getElementById('saveInvoiceBtn'); btn.innerText = "PROCESSING..."; btn.disabled = true;
            const items = Array.from(document.getElementById('invoiceItemsContainer').children).map(row => {
                const i = row.querySelectorAll('input'); return { desc: i[0].value, qty: i[1].value, price: i[2].value, total: (i[1].value * i[2].value).toFixed(2) };
            });
            const payload = {
                type: "invoice", client: document.getElementById('invCustomer').value, pic: document.getElementById('invPIC').value,
                email: document.getElementById('invEmail').value, address: document.getElementById('invAddress').value,
                invoiceNo: document.getElementById('invNo').value, invoiceDate: document.getElementById('invDate').value,
                dueDate: document.getElementById('invDate').value, items: items,
                grandTotal: items.reduce((sum, i) => sum + parseFloat(i.total), 0).toFixed(2),
                terms: document.getElementById('invTerms').value
            };
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) }).then(res => res.json()).then(res => {
                btn.innerText = "GENERATE INVOICE"; btn.disabled = false;
                if(res.status === 'success') showSuccessModal(res.pdfUrl);
            });
        });
    </script>
</body>
</html>
