<script>
    let db = JSON.parse(localStorage.getItem('at_db')) || [];

    // --- Kredensial Telegram Faiz ---
    const TELEGRAM_BOT_TOKEN = '8660418607:AAH-Lz-n3qIy6dNZ02BgF8RtsmGSnsrAI_s';
    const TELEGRAM_CHAT_ID = '5964232885'; 

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (event && event.currentTarget) event.currentTarget.classList.add('active');
        if(id === 'board-page') render();
    }

    const form = document.getElementById('creativeForm');
    if(form) {
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const pName = document.getElementById('pName').value;
            const pType = document.getElementById('pType').value;
            const pBrief = document.getElementById('pBrief').value;

            const newReq = {
                id: Date.now(),
                name: pName,
                type: pType,
                status: 'backlog'
            };

            // 1. Simpan dalam Dashboard LocalStorage
            db.push(newReq);
            localStorage.setItem('at_db', JSON.stringify(db));

            // 2. Format Mesej Telegram (Muji Style - Clean & Clear)
            const mesejTelegram = `
✨ *NEW CREATIVE REQUEST* ✨
─────────────────────
📋 *Project:* ${pName}
🏷️ *Type:* ${pType}
📝 *Brief:* ${pBrief}

─────────────────────
🕒 *Time:* ${new Date().toLocaleString('ms-MY')}
✅ _Sila semak dashboard Adtechinno untuk tindakan lanjut._
            `;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: mesejTelegram,
                        parse_mode: 'Markdown'
                    })
                });

                if(response.ok) {
                    alert("Request Recorded & Telegram Sent!");
                } else {
                    alert("Request Saved, but Telegram failed. (Check if you have started the bot)");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Network Error: Data saved locally only.");
            }

            form.reset();
            showPage('board-page');
        });
    }

    function render() {
        const cols = {
            backlog: document.getElementById('col-backlog'),
            progress: document.getElementById('col-progress'),
            review: document.getElementById('col-review')
        };

        if(!cols.backlog) return;

        Object.values(cols).forEach(c => {
            c.innerHTML = `<span class="column-header">${c.id.split('-')[1].toUpperCase()}</span>`;
        });

        db.forEach(item => {
            const card = document.createElement('div');
            card.className = 'task-card';
            card.innerHTML = `
                <strong>${item.name}</strong>
                <span>${item.type}</span><br>
                ${item.status !== 'review' ? 
                    `<button class="btn-next" onclick="next(${item.id})">Move to ${item.status === 'backlog' ? 'Progress' : 'Review'} →</button>` : 
                    '<div class="tag" style="background:#dcfce7; color:#166534;">⭐ Ready for Review</div>'}
                <button onclick="deleteTask(${item.id})" style="border:none; background:none; color:#ff4d4d; font-size:0.7rem; cursor:pointer; margin-left:10px;">Delete</button>
            `;
            cols[item.status].appendChild(card);
        });
    }

    function next(id) {
        const i = db.findIndex(x => x.id == id);
        if(db[i].status === 'backlog') db[i].status = 'progress';
        else if(db[i].status === 'progress') db[i].status = 'review';
        localStorage.setItem('at_db', JSON.stringify(db));
        render();
    }

    function deleteTask(id) {
        if(confirm("Confirm delete request?")) {
            db = db.filter(x => x.id != id);
            localStorage.setItem('at_db', JSON.stringify(db));
            render();
        }
    }

    window.onload = render;
</script>
